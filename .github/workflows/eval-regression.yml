name: Eval Regression

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:

jobs:
  eval:
    name: Eval Regression Check
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run retrieval evaluation
        run: bun run eval || true

      - name: Compare against baseline
        id: compare
        run: |
          if [ -f tests/eval/results.json ] && [ -f tests/eval/baseline.json ]; then
            bun run scripts/compare-eval.ts
          elif [ ! -f tests/eval/baseline.json ]; then
            echo "No baseline.json found — skipping regression check"
          else
            echo "No results.json found — eval may have failed"
            exit 1
          fi
        continue-on-error: true

      - name: Open GitHub issue on regression
        if: steps.compare.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Eval regression detected — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Retrieval Eval Regression',
              '',
              'The weekly eval run detected a regression in retrieval quality.',
              'One or more metrics dropped more than 0.05 from baseline, or MRR@5 fell below 0.5.',
              '',
              '**Action required:** Review the eval output in the workflow run and investigate.',
              '',
              `**Workflow run:** ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              '',
              '### Next steps',
              '1. Download the `eval-results` artifact from the failed run',
              '2. Compare against `tests/eval/baseline.json`',
              '3. Run `bun run scripts/compare-eval.ts` locally after `bun run eval`',
              '4. Fix the regression and update `tests/eval/baseline.json` if the new baseline is intentional',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['eval-regression', 'bug'],
            });

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: tests/eval/results.json
          retention-days: 90
