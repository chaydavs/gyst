name: Weekly Eval

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:

jobs:
  eval:
    name: Weekly Retrieval Eval
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-minilm-v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run retrieval evaluation
        run: bun run eval

      - name: Compare against baseline
        id: compare
        run: bun run scripts/compare-eval.ts
        continue-on-error: true

      - name: Open GitHub issue on regression
        if: steps.compare.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let diffBody = '';
            try {
              const results = JSON.parse(fs.readFileSync('tests/eval/results.json', 'utf8'));
              const baseline = JSON.parse(fs.readFileSync('tests/eval/baseline.json', 'utf8'));
              const metrics = ['mrr', 'meanPrecision', 'meanRecall', 'meanNdcg', 'hitRate'];
              const rows = metrics.map(m => {
                const b = (baseline[m] ?? 0).toFixed(4);
                const c = (results[m] ?? 0).toFixed(4);
                const raw = (results[m] ?? 0) - (baseline[m] ?? 0);
                const sign = raw >= 0 ? '+' : '';
                return `| ${m} | ${b} | ${c} | ${sign}${raw.toFixed(4)} |`;
              }).join('\n');
              diffBody = [
                '| Metric | Baseline | Current | Delta |',
                '|--------|----------|---------|-------|',
                rows,
              ].join('\n');
            } catch (e) {
              diffBody = '_Could not read results — see workflow logs._';
            }

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const title = 'Retrieval quality regression detected';
            const body = [
              '## Retrieval Eval Regression',
              '',
              'The weekly eval run detected a regression in retrieval quality.',
              'One or more metrics dropped more than 0.05 from baseline, or MRR@5 fell below 0.90.',
              '',
              '### Metric diff',
              '',
              diffBody,
              '',
              `**Workflow run:** ${runUrl}`,
              '',
              '### Next steps',
              '1. Download the `eval-results` artifact from the failed run',
              '2. Compare against `tests/eval/baseline.json`',
              '3. Run `bun run eval` then `bun run scripts/compare-eval.ts` locally',
              '4. Fix the regression and update `tests/eval/baseline.json` if the new baseline is intentional',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['eval-regression', 'bug'],
            });

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: tests/eval/results.json
          retention-days: 90
