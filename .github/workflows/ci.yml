name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            *.xml
          retention-days: 7

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "AKIA\|sk-[a-zA-Z0-9]\|-----BEGIN.*KEY\|xoxb-\|xapp-\|gho_" src/ --include="*.ts"

      - name: Check for console.log statements
        run: |
          ! grep -rn "console\.log" src/ --include="*.ts"

      - name: Run security filter tests
        run: bun test tests/compiler/security.test.ts

  eval:
    name: Eval (MRR@5)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run retrieval evaluation
        run: bun run eval || true

      - name: Check MRR@5 threshold
        run: |
          if [ -f tests/eval/results.json ]; then
            MRR=$(bun -e "import { readFileSync } from 'fs'; const r = JSON.parse(readFileSync('./tests/eval/results.json', 'utf8')); console.log(r.mrr || r.mrr5 || r.overall?.mrr5 || 0)")
            echo "MRR@5: $MRR"
            awk "BEGIN { exit !($MRR >= 0.5) }" || (echo "MRR@5 below 0.5 threshold" && exit 1)
          else
            echo "No results.json found — skipping threshold check"
          fi

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: tests/eval/results.json
          retention-days: 30
