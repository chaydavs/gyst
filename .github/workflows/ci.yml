name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test || [ $? -eq 133 ]

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            *.xml
          retention-days: 7

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for hardcoded secrets
        run: |
          # Scan source, test helpers, and the wiki for hardcoded creds.
          # Exclusions:
          #   security.ts  — the scanner's own regex patterns would self-match
          #   *.test.ts    — test files intentionally contain fake credential
          #                  strings as fixtures (e.g. AKIAIOSFODNN7EXAMPLE
          #                  which is AWS's documented example key) to
          #                  verify the security filter catches them.
          # We still scan tests/**/*.ts non-test files (like eval harnesses
          # and fixtures helpers) so a developer hardcoding a real cred in
          # test infrastructure is still caught.
          # Also scan *.md files so a learned wiki entry containing a real
          # secret would fail CI.
          ! grep -rn \
              "AKIA\|sk-[a-zA-Z0-9]\|-----BEGIN.*KEY\|xoxb-\|xapp-\|gho_" \
              src/ tests/ gyst-wiki/ \
              --include="*.ts" \
              --include="*.md" \
              --exclude="security.ts" \
              --exclude="*.test.ts"

      - name: Check for console.log statements
        run: |
          ! grep -rn "console\.log" src/ --include="*.ts"

      - name: Run security filter tests
        run: bun test tests/compiler/security.test.ts

  eval:
    name: Eval (MRR@5)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-minilm-v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run retrieval evaluation
        run: bun run eval || true

      - name: Check MRR@5 threshold
        run: |
          if [ -f tests/eval/results.json ]; then
            MRR=$(bun -e "import { readFileSync } from 'fs'; const r = JSON.parse(readFileSync('./tests/eval/results.json', 'utf8')); console.log(r.mrr || r.mrr5 || r.overall?.mrr5 || 0)")
            echo "MRR@5: $MRR"
            awk "BEGIN { exit !($MRR >= 0.90) }" || (echo "MRR@5 below 0.90 threshold" && exit 1)
          else
            echo "No results.json found — skipping threshold check"
          fi

      - name: Write eval metrics to job summary
        if: always()
        run: |
          if [ -f tests/eval/results.json ]; then
            bun -e "
              import { readFileSync } from 'fs';
              const r = JSON.parse(readFileSync('./tests/eval/results.json', 'utf8'));
              const lines = [
                '## Eval Results (MRR@5)',
                '',
                '| Metric | Value |',
                '|--------|-------|',
                \`| MRR@5 | \${(r.mrr ?? 0).toFixed(4)} |\`,
                \`| Precision@5 | \${(r.meanPrecision ?? 0).toFixed(4)} |\`,
                \`| Recall@5 | \${(r.meanRecall ?? 0).toFixed(4)} |\`,
                \`| NDCG@5 | \${(r.meanNdcg ?? 0).toFixed(4)} |\`,
                \`| Hit Rate | \${(r.hitRate ?? 0).toFixed(4)} |\`,
                \`| Queries | \${r.totalQueries ?? 0} |\`,
                '',
                \`_Timestamp: \${r.timestamp}_\`,
              ];
              process.stdout.write(lines.join('\n') + '\n');
            " >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: tests/eval/results.json
          retention-days: 30
